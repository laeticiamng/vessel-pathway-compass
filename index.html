<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vascular Atlas — AI-Powered Clinical Platform for Vascular Medicine</title>
    <meta name="description" content="Vascular Atlas unifies AI clinical reports, patient case management, outcomes registry, certification, simulation and expert networking for vascular surgeons and angiologists." />
    <meta name="author" content="Vascular Atlas" />
    <link rel="canonical" href="https://vascular-atlas.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Vascular Atlas — AI-Powered Clinical Platform for Vascular Medicine" />
    <meta property="og:description" content="Unify AI clinical reports, patient case management, outcomes registry, certification and expert networking — built for vascular surgeons." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vascular-atlas.com/" />
    <meta property="og:site_name" content="Vascular Atlas" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="de_DE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vascular Atlas — AI Clinical Platform for Vascular Medicine" />
    <meta name="twitter:description" content="AI reports, patient management, outcomes registry, certification & expert networking for vascular specialists." />

    <!-- Hreflang (SPA with language switcher — default EN) -->
    <link rel="alternate" hreflang="en" href="https://vascular-atlas.com/" />
    <link rel="alternate" hreflang="fr" href="https://vascular-atlas.com/?lang=fr" />
    <link rel="alternate" hreflang="de" href="https://vascular-atlas.com/?lang=de" />
    <link rel="alternate" hreflang="x-default" href="https://vascular-atlas.com/" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Vascular Atlas",
      "url": "https://vascular-atlas.com",
      "logo": "https://vascular-atlas.com/favicon.ico",
      "description": "AI-powered clinical platform for vascular medicine — unifying workflow, outcomes, education and research.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://vascular-atlas.com/support"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite with search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Vascular Atlas",
      "url": "https://vascular-atlas.com",
      "description": "AI-powered clinical platform for vascular medicine.",
      "inLanguage": ["en", "fr", "de"]
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Vascular Atlas",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "url": "https://vascular-atlas.com",
      "description": "Vascular Atlas is a clinical SaaS platform for vascular medicine that combines AI-assisted reporting, patient case management, a global outcomes registry, continuing medical education, clinical simulation, and expert networking.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Individual",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free plan for individual physicians exploring the platform"
        },
        {
          "@type": "Offer",
          "name": "Professional",
          "price": "99",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          },
          "description": "For practicing vascular physicians — unlimited AI, patients, digital twin, registry, education, simulation"
        },
        {
          "@type": "Offer",
          "name": "Institution",
          "description": "Custom pricing per seat for hospitals and vascular centers"
        }
      ],
      "featureList": [
        "AI Clinical Assistant with SOAP notes and differentials",
        "Vascular Digital Twin with lesion tracking",
        "Global Outcomes Registry with benchmarking",
        "Certification and CME with 5 competency tracks",
        "Clinical Simulation Lab with AI feedback",
        "Global Expert Network for tele-expertise"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
